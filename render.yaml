# Render Blueprint — deploys the whole app as one web service + a free Postgres.
# In Render: New → Blueprint → connect this repo → Apply. You get one public URL.
# The backend serves the built frontend and self-seeds the database on first boot.
databases:
  - name: cos-scheduler-db
    plan: free

services:
  - type: web
    name: cos-scheduler
    runtime: node
    plan: free
    # Install backend + frontend deps (incl. dev deps needed to build), build the
    # frontend into dist, which the backend then serves.
    buildCommand: cd "Scheduling app frontend" && npm install --include=dev && npm run build && cd "../Scheduling app backend" && npm install --include=dev && rm -rf public && cp -r "../Scheduling app frontend/dist" public
    startCommand: cd "Scheduling app backend" && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cos-scheduler-db
          property: connectionString
      - key: NODE_ENV
        value: production

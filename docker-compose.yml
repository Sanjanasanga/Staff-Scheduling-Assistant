# One-command containerized run:  docker compose up
# Brings up PostgreSQL, the backend (seeded on first boot), and the frontend.
# Frontend → http://localhost:5173   Backend → http://localhost:4100
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: cos_scheduler
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cos_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: "./Scheduling app backend"
    environment:
      DATABASE_URL: "postgresql://app:app@db:5432/cos_scheduler"
      PORT: "4100"
    depends_on:
      db:
        condition: service_healthy
    # Seed the database on first boot, then start the API.
    command: sh -c "npm run db:setup && npm run start"
    ports:
      - "4100:4100"

  frontend:
    build: "./Scheduling app frontend"
    environment:
      VITE_PROXY_TARGET: "http://backend:4100"
    depends_on:
      - backend
    ports:
      - "5173:5173"
